<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompting Technique Tester</title>
<style>
    body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f9fd06;
    display: flex;
    justify-content: center;
    padding-top: 100px;
}

.container {
    background: rgb(255, 0, 128);
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    width: 80%;
    max-width: 900px;
}

.input-group {
    margin-bottom: 20px;
}

input {
    padding: 8px;
    margin: 0 10px;
    width: 60px;
}

.button-group button {
    padding: 10px 15px;
    margin-right: 10px;
    cursor: pointer;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
}

.button-group button:hover {
    background-color: #0056b3;
}

pre {
    background: #272822;
    color: #0bbee2;
    padding: 15px;
    border-radius: 5px;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-top: 20px;
}

</style>
<script>
function generatePrompt(type) {
    const v = parseFloat(document.getElementById('voltage').value);
    const i = parseFloat(document.getElementById('current').value);
    const outputElement = document.getElementById('output');

    if (i === 0) {
        outputElement.textContent = "Current cannot be 0";
        return;
    }

    const r = v / i;
    let prompt = "";

    if (type === 'one-shot') {
        prompt = `--- ONE-SHOT PROMPT ---\n
Example:
Input: V=10V, I=2A
Output: R = V/I = 10/2 = 5 Ohms.

Now solve:
Input: V=${v}V, I=${i}A
Output: R = V/I = ${v}/${i} = ${r} Ohms`;
    } else {
        prompt = `--- FEW-SHOT PROMPT ---\n
Example 1:
Input: V=10V, I=2A
Output: R = V/I = 10/2 = 5 Ohms.

Example 2:
Input: V=100V, I=10A
Output: R = V/I = 100/10 = 10 Ohms.

Example 3:
Input: V=5V, I=0.5A
Output: R = V/I = 5/0.5 = 10 Ohms.

Now solve:
Input: V=${v}V, I=${i}A
Output: R = V/I = ${v}/${i} = ${r} Ohms`;
    }

    outputElement.textContent = prompt;
}

    </script>
        
</head>
<body>
    <div class="container">
        <h2>Ohm's Law Prompt Generator</h2>
        <p>Select a technique to see how the instructions change.</p>
        
        <div class="input-group">
            <label>Voltage (V):</label>
            <input type="number" id="voltage" value="24">
            <label>Current (I):</label>
            <input type="number" id="current" value="6">
        </div>

        <div class="button-group">
            <button onclick="generatePrompt('one-shot')">One-Shot Prompt</button>
            <button onclick="generatePrompt('few-shot')">Few-Shot Prompt</button>
        </div>

        <h3>Generated Prompt for AI:</h3>
        <pre id="output"></pre>
    </div>
</body>
</html>
